services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - jellyfin_config:/config
      - ${JELLYFIN_MEDIA_DIR}:/data/media
    ports:
      - "8096:8096"
    networks:
      - homelab

networks:
  homelab:
    external: true

volumes:
  jellyfin_config:
