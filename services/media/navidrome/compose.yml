services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      ND_MUSICFOLDER: /music
    volumes:
      - navidrome_data:/data
      - ${NAVIDROME_MUSIC_DIR}:/music:ro
    ports:
      - "4533:4533"
    networks:
      - homelab

networks:
  homelab:
    external: true

volumes:
  navidrome_data:
