services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      SECRET_ENCRYPTION_KEY: ${HOMARR_SECRET_ENCRYPTION_KEY}
    volumes:
      - homarr_data:/appdata
    ports:
      - "7575:7575"
    networks:
      - homelab

networks:
  homelab:
    external: true

volumes:
  homarr_data:
