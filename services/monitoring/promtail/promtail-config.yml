server:
  http_listen_port: 9080
positions:
  filename: /tmp/positions/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'compose_project'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'

  # Feeds the "SSH Security Monitor" Grafana dashboard (see
  # monitoring/grafana/provisioning/dashboards). Extracts action/method/
  # src_ip/ssh_user as labels so the dashboard's queries can filter on them.
  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: ssh-auth
          __path__: /var/log/auth.log
    pipeline_stages:
      - match:
          selector: '{job="ssh-auth"}'
          stages:
            - regex:
                expression: 'sshd(?:-session)?\[\d+\]: (?P<action>Accepted|Failed|Disconnected|Invalid user|Connection closed by) (?:(?P<method>publickey|password|keyboard-interactive) for (?:invalid user )?)?(?P<ssh_user>\S+)?(?: from (?P<src_ip>\d+\.\d+\.\d+\.\d+))?(?: port (?P<src_port>\d+))?'
            - labels:
                action:
                ssh_user:
                src_ip:
                method:
